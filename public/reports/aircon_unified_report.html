        attribution:'&copy; OpenStreetMap contributors'\r\n      }).addTo(map);\r\n    }\r\n\r\n    function currentDataset() {\r\n      return teams[activeTeamKey].datasets[activeTypeKey];\r\n    }\r\n\r\n    function modelRows(models) {\r\n      return `<div class=\"model-row model-head\"><span>모델명</span><span>상품코드</span><span>연도</span><span>수량</span></div>` +\r\n        models.map((m) => `<div class=\"model-row${m.priority ? ' priority' : ''}\">\r\n          <b>${m.model}</b><span>${m.code}</span><span>${m.year || '-'}</span><em>${m.qty}</em>\r\n        </div>`).join('');\r\n    }\r\n\r\n    function searchText(store) {\r\n      return `${store.name} ${store.models.map((m) => `${m.model} ${m.code} ${m.year || ''}`).join(' ')}`.toLowerCase();\r\n    }\r\n\r\n    function clearMarkers() {\r\n      if (!hasMap) { markers = []; return; }\r\n      markers.forEach((m) => map.removeLayer(m));\r\n      markers = [];\r\n    }\r\n\r\n    function resetMapView() {\r\n      if (!hasMap) return;\r\n      const stores = currentDataset().stores;\r\n      const bounds = stores.map((s) => [s.lat, s.lng]);\r\n      if (bounds.length) map.fitBounds(L.latLngBounds(bounds), { padding:[44, 44] });\r\n    }\r\n\r\n    function renderTeamTabs() {\r\n      const tabs = document.getElementById('teamTabs');\r\n      tabs.innerHTML = '';\r\n      Object.values(teams).forEach((team) => {\r\n        const button = document.createElement('button');\r\n        button.className = `tab${team.key === activeTeamKey ? ' active' : ''}`;\r\n        button.textContent = team.label;\r\n        button.type = 'button';\r\n        button.addEventListener('click', () => {\r\n          activeTeamKey = team.key;\r\n          document.getElementById('search').value = '';\r\n          render();\r\n        });\r\n        tabs.appendChild(button);\r\n      });\r\n    }\r\n\r\n    function renderTypeTabs() {\r\n      const tabs = document.getElementById('typeTabs');\r\n      tabs.innerHTML = '';\r\n      Object.values(teams[activeTeamKey].datasets).forEach((dataset) => {\r\n        const button = document.createElement('button');\r\n        button.className = `tab${dataset.key === activeTypeKey ? ' active' : ''}`;\r\n        button.textContent = dataset.tab;\r\n        button.type = 'button';\r\n        button.addEventListener('click', () => {\r\n          activeTypeKey = dataset.key;\r\n          document.getElementById('search').value = '';\r\n          render();\r\n        });\r\n        tabs.appendChild(button);\r\n      });\r\n    }\r\n\r\n    function renderList() {\r\n      const dataset = currentDataset();\r\n      const q = document.getElementById('search').value.trim().toLowerCase();\r\n      const list = document.getElementById('list');\r\n      const visibleStores = dataset.stores\r\n        .slice()\r\n        .sort((a, b) => b.qty - a.qty || a.name.localeCompare(b.name, 'ko'))\r\n        .filter((s) => !q || searchText(s).includes(q));\r\n      document.getElementById('listMeta').innerHTML = q\r\n        ? `<span>검색 결과 <b>${visibleStores.length}</b>개 점포</span><span>${dataset.stores.length}개 중</span>`\r\n        : `<span>수량 많은 점포순</span><span>전체 <b>${visibleStores.length}</b>개 점포</span>`;\r\n      list.innerHTML = '';\r\n      visibleStores\r\n        .forEach((s, i) => {\r\n          const div = document.createElement('div');\r\n          div.className = `store${s.priorityQty ? ' has-priority' : ''}`;\r\n          div.innerHTML = `<div class=\"store-head\"><strong>${String(i + 1).padStart(2, '0')}. ${s.name}</strong><span class=\"badge\">${s.qty}개</span></div>\r\n            <div class=\"chips\"><span class=\"chip\">모델 ${s.modelCount}</span>${s.priorityQty ? `<span class=\"chip hot\">과년도 ${s.priorityQty}</span>` : ''}</div>\r\n            <details><summary>보유 모델 전체 보기</summary><div class=\"model-list\">${modelRows(s.models)}</div></details>`;\r\n          div.addEventListener('click', (event) => {\r\n            if (event.target.tagName.toLowerCase() === 'summary') return;\r\n            map.setView([s.lat, s.lng], 13);\r\n            const marker = markers.find((m) => m.storeName === s.name);\r\n            if (marker) marker.openPopup();\r\n          });\r\n          list.appendChild(div);\r\n        });\r\n    }\r\n\r\n    function renderMarkers() {\r\n      clearMarkers();\r\n      if (!hasMap) return;\r\n      currentDataset().stores.forEach((s) => {\r\n        const width = Math.max(132, Math.min(210, 74 + s.name.length * 12));\r\n        const icon = L.divIcon({\r\n          className:'',\r\n          html:`<div class=\"pin-label\"><span class=\"pin-dot\"></span><span>${s.name}</span><span class=\"pin-qty\">${s.qty}</span></div>`,\r\n          iconSize:[width, 36],\r\n          iconAnchor:[width / 2, 18],\r\n        });\r\n        const popup = `<div class=\"popup\"><h3>${s.name}</h3>\r\n          <div class=\"meta\">총 ${s.qty}개 | 모델 ${s.modelCount}개${s.priorityQty ? ` | 과년도 ${s.priorityQty}개` : ''}</div>\r\n          <div class=\"model-list\">${modelRows(s.models)}</div></div>`;\r\n        const marker = L.marker([s.lat, s.lng], { icon }).bindPopup(popup, { minWidth:540, maxWidth:560, autoPanPadding:[24,24] }).addTo(map);\r\n        marker.storeName = s.name;\r\n        markers.push(marker);\r\n      });\r\n    }\r\n\r\n    function renderMissing() {\r\n      const box = document.getElementById('missing');\r\n      const missing = currentDataset().missingStores || [];\r\n      if (!missing.length) {\r\n        box.style.display = 'none';\r\n        box.textContent = '';\r\n        return;\r\n      }\r\n      box.style.display = 'block';\r\n      box.textContent = `좌표 미등록 점포: ${missing.join(', ')}`;\r\n    }\r\n\r\n    function renderKpis(dataset) {\r\n      const kpis = document.getElementById('kpis');\r\n      if (activeTypeKey === 'tv') {\r\n        kpis.className = 'kpis year-mode';\r\n        const yearQty = dataset.totals.year_qty || {};\r\n        kpis.innerHTML = ['21년', '22년', '23년', '24년', '25년']\r\n 내기 ${product.components[0]}와 벽걸이 구성품 ${product.components[1]} 조합입니다.`],\n    [\"스탠드 냉방면적\", `${product.area} 기준 모델입니다.`],\n    [\"에너지 등급\", `${product.energy} 모델입니다.`],\n    [`${product.line} 라인`, lineDescription(product)],\n    [`${product.series} 포지션`, seriesDescription(product)]\n  ];\n\n  for (const feature of product.features) {\n    if (feature === \"알러지케어 집진필터(4EA)\") details.push([feature, \"공기청정 필터가 공식 요약 스펙에 표시된 모델입니다.\"]);\n    if (feature === \"한쪽바람\") details.push([feature, \"직접 바람 부담을 줄이고 싶은 고객에게 설명하기 좋은 기류 기능입니다.\"]);\n    if (feature === \"필터클린봇\") details.push([feature, \"프리미엄 상담에서 관리 부담을 줄여주는 요소로 강조하세요.\"]);\n    if (feature === \"벽걸이 단품\") details.push([feature, \"스탠드 조합이 아닌 벽걸이 단품으로 설치 공간과 냉방면적을 먼저 확인하세요.\"]);\n    if (feature === \"듀얼쿨 벽걸이 조합\") details.push([feature, \"SQ06GS3 계열 벽걸이 조합으로 기본 벽걸이 조합과 구분하세요.\"]);\n    if (feature === \"기본 벽걸이 조합\") details.push([feature, \"SQ06GA 계열 벽걸이 조합으로 이해하면 됩니다.\"]);\n  }\n  return details.map(([title, body]) => ({ title, body }));\n}\nfunction lineDescription(product) {\n  if (product.line === \"벽걸이\") return \"벽걸이 단품 라인으로 작은 공간 냉방 상담에 적합합니다.\";\n  if (product.line === \"듀얼쿨\") return \"벽걸이 단품 중 기류와 기능 포인트를 함께 설명하기 좋은 라인입니다.\";\n  if (product.line === \"칸\") return \"기본 냉방 니즈 중심으로 설명하기 좋은 라인입니다.\";\n  if (product.line === \"타워I\") return \"타워I 디자인과 프리미엄 이미지를 원하는 고객에게 제안하기 좋은 라인입니다.\";\n  if (product.line === \"뷰I 프로\") return \"뷰I 디자인에 프로 라인 포지션을 더한 모델군입니다.\";\n  if (product.line === \"뷰I\") return \"오브제컬렉션 뷰I 디자인을 중심으로 설명하기 좋은 모델군입니다.\";\n  if (product.line === \"뷰II\") return \"뷰II 라인으로, 19형급 모델을 구분해서 안내하기 좋습니다.\";\n  if (product.line === \"쿨 프로\") return \"실속형과 기능형 사이에서 설명하기 좋은 모델입니다.\";\n  return \"기본 냉방 니즈를 중심으로 제안하기 좋은 라인입니다.\";\n}\nfunction seriesDescription(product) {\n  if (product.series === \"9시리즈\") return \"프리미엄 포지션입니다.\";\n  if (product.series === \"6시리즈\") return \"상위 기능과 효율을 강조하기 좋은 포지션입니다.\";\n  if (product.series === \"5시리즈\") return \"균형형으로 설명하기 좋은 주력 포지션입니다.\";\n  if (product.series === \"4시리즈\") return \"기능 포인트를 더해 설명하기 좋은 중간 포지션입니다.\";\n  if (product.series === \"3시리즈\") return \"디자인 접근형 포지션으로 설명하기 좋습니다.\";\n  return \"기본 포지션으로, 구성 중심 안내에 좋습니다.\";\n}\nsearch.addEventListener(\"input\",renderList);const initial=location.hash.replace(\"#\",\"\").toUpperCase();if(products.some(p=>p.id===initial))selectedId=initial;selectProduct(selectedId);window.selectProduct=selectProduct;\n<\/script>\n</body>\n</html>"
};
for (const [id, source] of Object.entries(frames)) {
  document.getElementById(id).srcdoc = source;
}
function activateTab(target, updateHash = true) {
  const nextTarget = frames[target] ? target : "mapFrame";
  document.querySelectorAll(".tab").forEach(tab => {
    const active = tab.dataset.target === nextTarget;
    tab.classList.toggle("active", active);
    tab.setAttribute("aria-selected", active ? "true" : "false");
  });
  document.querySelectorAll("iframe").forEach(frame => frame.classList.toggle("active", frame.id === nextTarget));
  if (updateHash) {
    const hash = nextTarget === "trainingFrame" ? "#models" : "#map";
    try { history.replaceState(null, "", hash); } catch {}
  }
}
document.querySelectorAll(".tab").forEach(button => {
  button.addEventListener("click", () => {

});
activateTab(location.hash === "#models" ? "trainingFrame" : "mapFrame", false);
